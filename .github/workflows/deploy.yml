name: Deploy VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 31.97.168.45
          username: root
          key: ${{ secrets.SSH_KEY }}

          script: |
            cd ~/Controle_Fincanceiro_Inteligente
            git pull origin main

            echo "BACKEND"
            cd backend
            npm install
            npm run build

            echo "FRONTEND"
            cd ../frontend
            npm install
            npm run build

            npx pm2 restart all